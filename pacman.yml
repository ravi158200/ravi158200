name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: YOUR_GITHUB_USERNAME

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: pacman
          path: dist
