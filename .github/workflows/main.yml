name: Generate Animations

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4

      # 1. Generate Snake Animation
      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ravi158200
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. Generate Pac-Man Animation
      - name: generate pacman svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          username: ravi158200

      # 3. Organize files for deployment
      - name: organize files
        run: |
          mkdir -p dist
          # Move pacman files to dist. The action might name them pacman-contribution-graph.svg
          # or github-contribution-grid-pacman.svg. Let's handle both.
          mv pacman-contribution-graph.svg dist/ 2>/dev/null || mv github-contribution-grid-pacman.svg dist/pacman-contribution-graph.svg 2>/dev/null || true
          
          # Ensure dark version exists for README picture tags
          if [ ! -f dist/pacman-contribution-graph-dark.svg ]; then
            cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg 2>/dev/null || true
          fi

      # 4. Deploy to output branch
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
