name: Generate Animations

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4

      # 1. Generate Snake Animation
      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ravi158200
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. Generate Pac-Man Animation
      # We use abozanona/pacman-contribution-graph
      - name: generate pacman svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          username: ravi158200

      # 3. Organize files for deployment
      - name: organize files
        run: |
          mkdir -p dist
          # The pacman action usually creates a file named github-contribution-grid-pacman.svg
          # We rename it to match the user's README links
          mv github-contribution-grid-pacman.svg dist/pacman-contribution-graph.svg || true
          # Create a dark version of pacman as well (or just copy the same one if dark not supported)
          cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg || true

      # 4. Deploy to output branch
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
