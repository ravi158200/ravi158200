name: Update Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pac-Man Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ravi158200

      - name: Organize Files
        run: |
          mkdir -p dist
          # The action generates pacman-contribution-graph.svg by default
          # and it also generates a dark version if supported, or we can copy it.
          # Let's see what files were generated
          ls -R
          mv pacman-contribution-graph.svg dist/ || true
          # Create a copy for dark mode if it doesn't exist
          cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg || true

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
